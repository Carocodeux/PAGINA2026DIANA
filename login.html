                <form id="login-form" class="auth-form active">
                    <h2>Accede a tu cuenta</h2>
                    <div class="form-groupn "></div>
                    <label for="login-mail">Correo electrónico</label>
                    <input type="email" id="login-mail" placeholder="Correo electrónico" required />

                    <div class="form-group"></div>
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="*************" required />
                </div>

                <button type="submit" class="auth-submit">Entrar</button>
                <p id="login-message" class="auth-message"></p>
                </form>


                <form id="register-form" class="auth-form">
                    <h2>Crea una nueva cuenta</h2>
                    <div class="form-group">
                        <label for="register-name">Nombre completo</label>
                        <input type="text" id="register-name" placeholder="Nombre" required />
                    </div>

                    <div class="form-group">
                        <label for="register-email">Correo electrónico</label>
                        <input type="email" id="register-email" placeholder="Correo electrónico" required />
                    </div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" placeholder="mínimo 6 caracteres" required />
                    </div>

                    <div class="form-group">
                        <label for="register-password">Confirmar contraseña</label>
                        <input type="password" id="register-password" placeholder="Repite tu contraseña" required />

                    <button type="submit" class="auth-submit">Registrarse</button>
                    <p id="register-message" class="auth-message"></p>
                </form>

    </section>
